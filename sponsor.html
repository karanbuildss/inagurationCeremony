<!DOCTYPE html>
<html lang="ne">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>शुभारंभ समारोह | प्रायोजकहरू</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Yatra+One&family=Tiro+Devanagari+Hindi:ital@0;1&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .tier-platinum { border-top: 4px solid #c0c0c0 !important; }
    .tier-gold     { border-top: 4px solid var(--gold-light) !important; }
    .tier-silver   { border-top: 4px solid #a8c0d8 !important; }
    .tier-other    { border-top: 4px solid var(--bright-red) !important; }

    .sponsor-icon-ring {
      width: 72px; height: 72px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1rem;
      border: 2px solid rgba(200,152,42,0.25);
      background: var(--cream);
      box-shadow: 0 4px 15px rgba(74,14,14,0.12);
    }

    .stars { color: var(--gold-light); letter-spacing: 3px; }

    .contact-box {
      background: linear-gradient(135deg, var(--deep-maroon), var(--rich-crimson));
      color: var(--gold-light);
      border: 1px solid var(--gold);
      border-radius: 16px;
      padding: 1.2rem 2rem;
      font-family: 'Crimson Pro', serif;
      font-size: 1.05rem;
      display: inline-block;
    }
  </style>
</head>
<body>

<!-- Navigation -->
<nav class="navbar navbar-expand-lg sticky-top">
  <div class="container">
    <a class="navbar-brand" href="index.html">
      <i class="bi bi-brightness-alt-high"></i> शुभारंभ समारोह
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" href="index.html"><i class="bi bi-scissors"></i> फिता काट्ने</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" href="sponsor.html"><i class="bi bi-trophy-fill"></i> प्रायोजकहरू</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="diyo.html"><i class="bi bi-brightness-alt-high"></i> दीप प्रज्वलन</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- Main -->
<main class="container py-5">

  <!-- Header -->
  <div class="text-center mb-5" data-animate>
    <div class="deco-symbol mb-2">🏆</div>
    <h1 class="ceremony-title">
      हाम्रा सम्मानित प्रायोजकहरू
    </h1>
    <p class="ceremony-subtitle mt-2">
      यस भव्य समारोहलाई साकार पार्ने दूरदर्शी साझेदारहरू
    </p>
    <div class="gold-underline mt-3"></div>
    <div class="ornament-divider">
      <span style="color:var(--gold);">✦ ✦ ✦</span>
    </div>
  </div>

  <!-- Sponsors Grid -->
  <div class="row g-4" id="sponsorsGrid"></div>

  <!-- CTA -->
  <div class="text-center mt-5 pt-3" data-animate>
    <div class="contact-box mb-4">
      <i class="bi bi-envelope-fill me-2"></i>
      <strong>प्रायोजन सम्पर्क:</strong>&nbsp; partners@inauguration2025.com
    </div>
    <div class="mt-4">
      <a href="diyo.html" class="btn btn-ceremony rounded-pill px-5 py-3">
        <i class="bi bi-brightness-alt-high"></i>&nbsp; दीप प्रज्वलनमा अग्रसर हुनुहोस् →
      </a>
    </div>
  </div>

</main>

<footer class="footer text-center py-3 mt-5">
  <div class="container">
    <span><i class="bi bi-gem"></i>&nbsp; शुभारंभ समारोह २०२५ | समृद्धि र नयाँ सुरुवातको कामना</span>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>
<script>
  const sponsors = [
    { name: "श्री गणेश समूह",         icon: "bi-building",        tier: "प्लाटिनम साझेदार",  desc: "पूर्वाधार र उत्कृष्टता",      stars: 3, color: "#9a9a9a", tierClass: "tier-platinum" },
    { name: "उज्यालो उद्योग",           icon: "bi-lightbulb",       tier: "स्वर्ण प्रायोजक",    desc: "ऊर्जा र नवप्रवर्तन",         stars: 3, color: "#c8982a", tierClass: "tier-gold" },
    { name: "सरस्वती प्रविधि",          icon: "bi-cpu",             tier: "रजत साझेदार",       desc: "डिजिटल रूपान्तरण",           stars: 3, color: "#3498db", tierClass: "tier-silver" },
    { name: "अन्नपूर्ण केटरिङ",         icon: "bi-cup-straw",       tier: "आतिथ्य साझेदार",    desc: "परम्परागत स्वाद",             stars: 2, color: "#e67e22", tierClass: "tier-other" },
    { name: "दिव्य मिडिया हाउस",       icon: "bi-broadcast",       tier: "मिडिया साझेदार",    desc: "प्रत्यक्ष प्रसारण र सम्पर्क",  stars: 2, color: "#8e44ad", tierClass: "tier-other" },
    { name: "आरोही इभेन्ट्स",           icon: "bi-calendar-heart",  tier: "कार्यक्रम साझेदार", desc: "निर्दोष समन्वय",              stars: 2, color: "#d35400", tierClass: "tier-other" },
    { name: "कैलाश संस्कार",            icon: "bi-flower1",         tier: "अनुष्ठान साझेदार",  desc: "पवित्र व्यवस्था",             stars: 3, color: "#27ae60", tierClass: "tier-silver" },
    { name: "सुवर्ण ट्रस्ट बैंक",       icon: "bi-bank2",           tier: "वित्तीय साझेदार",   desc: "आर्थिक समृद्धि",              stars: 3, color: "#f39c12", tierClass: "tier-gold" },
  ];

  function loadSponsors() {
    const grid = document.getElementById('sponsorsGrid');
    sponsors.forEach((s, i) => {
      const col = document.createElement('div');
      col.className = 'col-md-6 col-lg-3';
      col.style.cssText = 'opacity:0; transform:translateY(24px); transition: all 0.55s cubic-bezier(0.34,1.56,0.64,1)';
      col.innerHTML = `
        <div class="card sponsor-card h-100 text-center p-3 ${s.tierClass}" style="border-top-width:4px;">
          <div class="card-body d-flex flex-column align-items-center justify-content-center gap-2">
            <div class="sponsor-icon-ring">
              <i class="bi ${s.icon}" style="font-size:2.2rem; color:${s.color}"></i>
            </div>
            <h3 class="h6 fw-bold" style="font-family:'Yatra One',serif; color:var(--deep-maroon); font-size:1rem;">${s.name}</h3>
            <span class="tier-badge">${s.tier}</span>
            <p class="card-text small mb-1" style="color:var(--text-muted); font-style:italic;">${s.desc}</p>
            <div class="stars">${'★'.repeat(s.stars)}${'☆'.repeat(3 - s.stars)}</div>
          </div>
        </div>`;
      grid.appendChild(col);
      setTimeout(() => {
        col.style.opacity = '1';
        col.style.transform = 'translateY(0)';
      }, 150 + i * 90);
    });
  }

  document.addEventListener('DOMContentLoaded', () => {
    loadSponsors();
    canvasConfetti({ particleCount: 100, spread: 60, origin: { y: 0.5 }, colors: ['#e67e22','#f1c40f','#c8982a'] });
  });
</script>
</body>
</html>
